<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesso Liberado | AUNIS Conecta</title>
    <!-- Use existing styles for consistency -->
    <link rel="stylesheet" href="./styles.css?v=8">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        /* Specific minimal styles for the Thank You Page */
        body {
            background-color: var(--color-black);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        
        .thank-you-container {
            text-align: center;
            background: var(--color-black-light);
            padding: 50px 40px;
            border-radius: 20px;
            border: 1px solid rgba(214, 187, 128, 0.2);
            box-shadow: 0 15px 50px rgba(0,0,0,0.8);
            max-width: 600px;
            width: 90%;
            position: relative;
            z-index: 10;
        }

        .success-icon {
            width: 80px;
            height: 80px;
            background: rgba(214, 187, 128, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 30px auto;
            color: var(--color-gold);
        }

        .thank-you-title {
            font-family: 'Outfit', sans-serif;
            font-size: 2.5rem;
            color: var(--color-white);
            margin-bottom: 15px;
        }

        .thank-you-text {
            font-size: 1.15rem;
            color: var(--color-white-dim);
            line-height: 1.6;
            margin-bottom: 40px;
        }

        .whatsapp-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background-color: #25D366;
            color: white;
            padding: 18px 30px;
            font-family: 'Outfit', sans-serif;
            font-size: 1.2rem;
            font-weight: 700;
            border-radius: 12px;
            text-decoration: none;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(37, 211, 102, 0.3);
            gap: 12px;
        }

        .whatsapp-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(37, 211, 102, 0.5);
            background-color: #128C7E;
        }

        .background-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(214, 66, 66, 0.15) 0%, rgba(0,0,0,0) 70%);
            z-index: 1;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="background-glow"></div>

    <div class="thank-you-container reveal active">
        <!-- Success Check Icon -->
        <div class="success-icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="20 6 9 17 4 12"></polyline>
            </svg>
        </div>
        
        <h1 class="thank-you-title">Parabéns por adquirir!</h1>
        
        <p class="thank-you-text">
            Sua vaga está garantida e agora você faz parte oficialmente do grupo de networking e oportunidades da <strong>AUNIS Conecta</strong>.
            <br><br>
            O último passo para concluir sua recepção é entrar no nosso ambiente exclusivo.
        </p>
        
        <a href="https://chat.whatsapp.com/FuySP6FX154L69VbM8o1U2?mode=gi_t" target="_blank" class="whatsapp-btn pulse">
            <!-- WhatsApp SVG Icon -->
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                <path d="M12.031 6.172c-3.181 0-5.767 2.586-5.768 5.766-.001 1.298.38 2.27 1.019 3.287l-.582 2.128 2.182-.573c.978.58 1.911.928 3.145.929 3.178 0 5.767-2.587 5.768-5.766.001-3.187-2.575-5.77-5.764-5.771zm3.392 8.244c-.144.405-.837.774-1.17.824-.299.045-.677.063-1.092-.069-.252-.08-.575-.187-.988-.365-1.739-.751-2.874-2.502-2.961-2.617-.087-.116-.708-.94-.708-1.793s.448-1.273.607-1.446c.159-.173.346-.217.462-.217l.332.006c.106.005.249-.04.39.298.144.347.491 1.2.534 1.287.043.087.072.188.014.304-.058.116-.087.188-.173.289l-.26.304c-.087.086-.177.18-.076.354.101.174.449.741.964 1.201.662.591 1.221.774 1.394.86s.274.072.376-.043c.101-.116.433-.506.549-.68.116-.173.231-.145.39-.087s1.011.477 1.184.564.289.13.332.202c.045.072.045.419-.1.824zm-3.423-14.416c-6.627 0-12 5.373-12 12s5.373 12 12 12 12-5.373 12-12-5.373-12-12-12zm.029 18.88c-1.161 0-2.305-.292-3.318-.844l-3.677.964.984-3.595c-.607-1.052-.927-2.246-.926-3.468.001-3.825 3.113-6.937 6.937-6.937 3.825 0 6.938 3.112 6.938 6.938 0 3.825-3.113 6.938-6.938 6.938z"/>
            </svg>
            Acessar Grupo do WhatsApp
        </a>
    </div>

</body>
</html>
